
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanguru Koşucu</title>

<style>
body{
margin:0;
background:white;
text-align:center;
font-family:Arial;
}

canvas{
background:white;
border-bottom:3px solid black;
}

#score{
font-size:24px;
margin-top:10px;
}

#gameOver{
display:none;
font-size:28px;
margin-top:20px;
}
</style>

</head>

<body>

<div id="score">Skor: 0</div>

<canvas id="game" width="400" height="200"></canvas>

<div id="gameOver">
Game Over<br>
<button onclick="restart()">Tekrar Başla</button>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let kangaroo = {
x:50,
y:140,
width:20,
height:20,
vy:0,
jump:false
}

let obstacles=[]
let score=0
let speed=4
let groundOffset=0
let gameRunning=true

function drawKangaroo(){
ctx.fillStyle="black"
ctx.fillRect(kangaroo.x,kangaroo.y,kangaroo.width,kangaroo.height)
}

function drawGround(){

groundOffset -= speed

if(groundOffset <= -40){
groundOffset = 0
}

for(let i=0;i<20;i++){

ctx.fillRect(i*40 + groundOffset,160,40,5)

}

}

function jump(){

if(!kangaroo.jump){

kangaroo.vy = -10
kangaroo.jump = true

}

}

document.addEventListener("touchstart",jump)
document.addEventListener("keydown",jump)

function createObstacle(){

let type = Math.floor(Math.random()*3)

let height = 20

if(type==1) height = 30
if(type==2) height = 25

obstacles.push({

x:400,
y:160-height,
width:20,
height:height

})

}

setInterval(createObstacle,1500)

function update(){

if(!gameRunning) return

ctx.clearRect(0,0,400,200)

drawGround()

kangaroo.y += kangaroo.vy
kangaroo.vy += 0.5

if(kangaroo.y >= 140){

kangaroo.y = 140
kangaroo.jump = false

}

drawKangaroo()

for(let i=0;i<obstacles.length;i++){

let o = obstacles[i]

o.x -= speed

ctx.fillRect(o.x,o.y,o.width,o.height)

if(

kangaroo.x < o.x + o.width &&
kangaroo.x + kangaroo.width > o.x &&
kangaroo.y < o.y + o.height &&
kangaroo.y + kangaroo.height > o.y

){

gameOver()

}

if(o.x < -20){

obstacles.splice(i,1)
score++

document.getElementById("score").innerText = "Skor: " + score

}

}

speed += 0.001

requestAnimationFrame(update)

}

function gameOver(){

gameRunning=false
document.getElementById("gameOver").style.display="block"

}

function restart(){

location.reload()

}

update()

</script>

</body>
  </html>
