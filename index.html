<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanguru Koşucu V3</title>

<style>
body{
margin:0;
text-align:center;
font-family:Arial;
background:#87CEEB;
}

canvas{
background:#87CEEB;
}

#score{
font-size:22px;
margin-top:10px;
}

#gameOver{
display:none;
font-size:28px;
margin-top:10px;
}
</style>
</head>

<body>

<div id="score">Skor: 0</div>

<canvas id="game"></canvas>

<div id="gameOver">
Game Over<br>
High Score: <span id="highScore"></span><br>
<button onclick="restart()">Tekrar Başla</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=200

let kangaroo={
x:60,
y:140,
width:30,
height:30,
vy:0,
jump:false
}

let obstacles=[]
let score=0
let speed=4
let groundOffset=0
let gameRunning=true

let highScore=localStorage.getItem("highScore")||0
document.getElementById("highScore").innerText=highScore

function drawSun(){
ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(canvas.width-60,40,20,0,Math.PI*2)
ctx.fill()
}

function drawGround(){

groundOffset-=speed

if(groundOffset<-40) groundOffset=0

ctx.fillStyle="#c2a679"

for(let i=0;i<canvas.width/40+2;i++){
ctx.fillRect(i*40+groundOffset,170,40,30)
}

}

function drawKangaroo(){

ctx.fillStyle="#8B4513"
ctx.fillRect(kangaroo.x,kangaroo.y,kangaroo.width,kangaroo.height)

}

function jump(){

if(!kangaroo.jump){
kangaroo.vy=-12
kangaroo.jump=true
}

}

document.addEventListener("touchstart",jump)
document.addEventListener("keydown",jump)

function createObstacle(){

let type=Math.floor(Math.random()*3)

let height=25

if(type==1) height=35
if(type==2) height=30

obstacles.push({
x:canvas.width,
y:170-height,
width:20,
height:height
})

}

setInterval(createObstacle,1400)

function update(){

if(!gameRunning) return

ctx.clearRect(0,0,canvas.width,canvas.height)

drawSun()
drawGround()

kangaroo.y+=kangaroo.vy
kangaroo.vy+=0.6

if(kangaroo.y>=140){
kangaroo.y=140
kangaroo.jump=false
}

drawKangaroo()

ctx.fillStyle="black"

for(let i=0;i<obstacles.length;i++){

let o=obstacles[i]

o.x-=speed

ctx.fillRect(o.x,o.y,o.width,o.height)

if(
kangaroo.x < o.x + o.width &&
kangaroo.x + kangaroo.width > o.x &&
kangaroo.y < o.y + o.height &&
kangaroo.y + kangaroo.height > o.y
){
gameOver()
}

if(o.x<-20){
obstacles.splice(i,1)
score++
document.getElementById("score").innerText="Skor: "+score
}

}

speed+=0.002

requestAnimationFrame(update)

}

function gameOver(){

gameRunning=false

if(score>highScore){
localStorage.setItem("highScore",score)
document.getElementById("highScore").innerText=score
}

document.getElementById("gameOver").style.display="block"

}

function restart(){
location.reload()
}

update()

</script>

</body>
  </html>
