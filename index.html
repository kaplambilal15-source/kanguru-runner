
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanguru Kaçış V9</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(#87CEEB, #ffffff);
}
canvas { display: block; }

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 18px;
}

#menu, #gameOver {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.5);
  color: white;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui"></div>

<div id="menu">
  <h1>Kanguru Kaçış V9</h1>
  <button onclick="startGame()">Başla</button>
  <button onclick="openShop()">Market</button>
</div>

<div id="gameOver" style="display:none;">
  <h1>Oyun Bitti</h1>
  <p id="finalScore"></p>
  <button onclick="restart()">Tekrar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let color = localStorage.getItem("color") || "black";
let totalCoins = parseInt(localStorage.getItem("coins")) || 0;

let kangaroo, obstacles, coins, score, speed, gameOver;

function init() {
  kangaroo = {
    x: 100,
    y: canvas.height - 150,
    w: 50,
    h: 50,
    vy: 0,
    jumping: false
  };
  obstacles = [];
  coins = [];
  score = 0;
  speed = 5;
  gameOver = false;
}

function startGame() {
  document.getElementById("menu").style.display = "none";
  init();
  loop();
}

function restart() {
  document.getElementById("gameOver").style.display = "none";
  startGame();
}
