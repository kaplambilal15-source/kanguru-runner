<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanguru Koşucu V4</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
background:#87CEEB;
}

#menu{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
}

button{
font-size:22px;
padding:10px 20px;
}

canvas{
display:block;
margin:auto;
}

#score{
position:absolute;
top:10px;
left:10px;
font-size:20px;
}

</style>

</head>

<body>

<div id="menu">
<h1>Kanguru Koşucu</h1>
<button onclick="startGame()">Başla</button>
</div>

<div id="score">Skor: 0</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=200

let kangaroo
let obstacles=[]
let score=0
let speed=4
let groundOffset=0
let gameRunning=false

let highScore=localStorage.getItem("highScore")||0

function startGame(){

document.getElementById("menu").style.display="none"

kangaroo={
x:60,
y:140,
width:30,
height:30,
vy:0,
jump:false
}

obstacles=[]
score=0
speed=4
gameRunning=true

update()

}

function drawSun(){

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(canvas.width-60,40,20,0,Math.PI*2)
ctx.fill()

}

function drawGround(){

groundOffset-=speed

if(groundOffset<-40) groundOffset=0

ctx.fillStyle="#c2a679"

for(let i=0;i<canvas.width/40+2;i++){
ctx.fillRect(i*40+groundOffset,170,40,30)
}

}

function drawKangaroo(){

ctx.fillStyle="#8B4513"

ctx.fillRect(kangaroo.x,kangaroo.y,kangaroo.width,kangaroo.height)

}

function jump(){

if(!kangaroo.jump){

kangaroo.vy=-12
kangaroo.jump=true

}

}

document.addEventListener("touchstart",jump)
document.addEventListener("keydown",e=>{
if(e.code==="Space") jump()
})

function createObstacle(){

let height=25+Math.random()*15

obstacles.push({

x:canvas.width,
y:170-height,
width:20,
height:height

})

}

setInterval(createObstacle,1500)

function update(){

if(!gameRunning) return

ctx.clearRect(0,0,canvas.width,canvas.height)

drawSun()
drawGround()

kangaroo.y+=kangaroo.vy
kangaroo.vy+=0.6

if(kangaroo.y>=140){
kangaroo.y=140
kangaroo.jump=false
}

drawKangaroo()

ctx.fillStyle="black"

for(let i=0;i<obstacles.length;i++){

let o=obstacles[i]

o.x-=speed

ctx.fillRect(o.x,o.y,o.width,o.height)

if(
kangaroo.x < o.x + o.width &&
kangaroo.x + kangaroo.width > o.x &&
kangaroo.y < o.y + o.height &&
kangaroo.y + kangaroo.height > o.y
){

gameOver()

}

if(o.x<-20){

obstacles.splice(i,1)

score++

document.getElementById("score").innerText="Skor: "+score

}

}

speed+=0.002

requestAnimationFrame(update)

}

function gameOver(){

gameRunning=false

if(score>highScore){

localStorage.setItem("highScore",score)

}

alert("Game Over | Skor: "+score)

location.reload()

}

</script>

</body>
  </html>
